<h2 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Interactive 3D model of a VTOL aircraft prototype with a large central lift rotor, a tapered fuselage, swept wings carrying small turbofan engines and ailerons, and a T-tail empennage with rudder and elevators</h2>

<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">
  <button id="btn-iso">3/4 view</button>
  <button id="btn-front">Front</button>
  <button id="btn-side">Side</button>
  <button id="btn-top">Top</button>
  <button id="btn-wire">Wireframe</button>
  <button id="btn-spin">Pause rotor</button>
</div>

<div style="position:relative; width:100%; height:440px; border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary); overflow:hidden;">
  <canvas id="c3d" style="width:100%; height:100%; display:block; touch-action:none;"></canvas>
</div>

<div style="display:flex; flex-wrap:wrap; gap:14px 18px; margin-top:14px; font-size:13px; color:var(--color-text-secondary);">
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#5a50c2;display:inline-block;"></span>Central lift rotor</span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#9a958c;display:inline-block;"></span>Fuselage</span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#1f6fb0;display:inline-block;"></span>Main wings</span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#e2754a;display:inline-block;"></span>Ailerons</span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#8a5a22;display:inline-block;"></span>Wing turbofans</span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#16876f;display:inline-block;"></span>Empennage</span>
  <span style="display:flex; align-items:center; gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:#3a3a38;display:inline-block;"></span>Landing gear</span>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('c3d');
const wrap = canvas.parentElement;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 300);
camera.up.set(0, 0, 1);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(wrap);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 32;
controls.maxPolarAngle = Math.PI * 0.49;
controls.target.set(0, -0.3, 1.6);
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;

function setView(pos, target) {
  camera.position.set(pos[0], pos[1], pos[2]);
  controls.target.set(target[0], target[1], target[2]);
  controls.update();
}
setView([11, -13, 9], [0, -0.3, 1.6]);

const hemi = new THREE.HemisphereLight(0xffffff, 0x55534a, 1.05);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.7);
sun.position.set(9, -7, 16);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -12;
sun.shadow.camera.right = 12;
sun.shadow.camera.top = 12;
sun.shadow.camera.bottom = -12;
scene.add(sun);
scene.add(sun.target);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(9, 48),
  new THREE.MeshStandardMaterial({ color: 0xd7d4c8, roughness: 1, metalness: 0 })
);
ground.receiveShadow = true;
scene.add(ground);

const aircraft = new THREE.Group();
scene.add(aircraft);

function mat(color, opts) {
  return new THREE.MeshStandardMaterial(Object.assign({ color, roughness: 0.55, metalness: 0.2 }, opts || {}));
}
function add(mesh, shadow) {
  if (shadow) mesh.castShadow = true;
  aircraft.add(mesh);
  return mesh;
}

const COLOR_FUSE = 0x9a958c;
const COLOR_WING = 0x1f6fb0;
const COLOR_AIL = 0xe2754a;
const COLOR_ENGINE = 0x8a5a22;
const COLOR_ENGINE_ACC = 0xf0a430;
const COLOR_ROTOR_HUB = 0x5a50c2;
const COLOR_ROTOR_BLADE = 0x3c3489;
const COLOR_TAIL = 0x16876f;
const COLOR_TAIL_ACC = 0x0d6353;
const COLOR_GEAR = 0x3a3a38;

const FZ = 1.6;
const fuseMat = mat(COLOR_FUSE);

const nose = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.6, 28), fuseMat);
nose.position.set(0, 4.4, FZ);
add(nose, true);

const body = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 5.2, 28), fuseMat);
body.position.set(0, 1.0, FZ);
add(body, true);

const taper = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.15, 2.3, 24), fuseMat);
taper.position.set(0, -2.75, FZ);
add(taper, true);

const tailCap = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 18), fuseMat);
tailCap.rotation.x = Math.PI;
tailCap.position.set(0, -4.1, FZ);
add(tailCap);

function makeWingGeometry(span, rootChord, tipChord, sweep, thickness, sign) {
  const rootLE = 0, rootTE = -rootChord, tipLE = -sweep, tipTE = -sweep - tipChord;
  const shape = new THREE.Shape();
  shape.moveTo(0, rootLE);
  shape.lineTo(0, rootTE);
  shape.lineTo(sign * span, tipTE);
  shape.lineTo(sign * span, tipLE);
  shape.lineTo(0, rootLE);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false });
  geo.translate(0, 0, -thickness / 2);
  return geo;
}

const WING_Z = FZ;
const ROOT_X = 0.92, SPAN = 3.6, ROOT_CHORD = 1.55, TIP_CHORD = 0.8, SWEEP = 0.5, WING_THICK = 0.16;
const WING_LE_Y = 0.9;

[1, -1].forEach((sign) => {
  const wingMat = mat(COLOR_WING, { side: THREE.DoubleSide, roughness: 0.45 });
  const wing = new THREE.Mesh(makeWingGeometry(SPAN, ROOT_CHORD, TIP_CHORD, SWEEP, WING_THICK, sign), wingMat);
  wing.position.set(sign * ROOT_X, WING_LE_Y, WING_Z);
  add(wing, true);

  const ailMat = mat(COLOR_AIL, { roughness: 0.4 });
  const ail = new THREE.Mesh(new THREE.BoxGeometry(SPAN * 0.32, 0.4, 0.07), ailMat);
  ail.position.set(sign * (ROOT_X + SPAN * 0.78), WING_LE_Y - SWEEP - TIP_CHORD - 0.05, WING_Z);
  add(ail);

  const engX = sign * (ROOT_X + SPAN * 0.55);
  const engY = WING_LE_Y - ROOT_CHORD * 0.55;
  const engZ = WING_Z - 0.6;

  const pylon = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.3, 0.5), mat(0x55524a));
  pylon.position.set(engX, engY, (WING_Z + engZ) / 2 + 0.05);
  add(pylon);

  const nacelle = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.5, 18), mat(COLOR_ENGINE, { roughness: 0.35, metalness: 0.4 }));
  nacelle.position.set(engX, engY, engZ);
  add(nacelle, true);

  const intake = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.06, 8, 20), mat(COLOR_ENGINE_ACC, { roughness: 0.3, metalness: 0.5 }));
  intake.rotation.x = Math.PI / 2;
  intake.position.set(engX, engY + 0.75, engZ);
  add(intake);

  const exhaust = new THREE.Mesh(new THREE.ConeGeometry(0.27, 0.4, 18), mat(0x2c2a26));
  exhaust.rotation.x = Math.PI;
  exhaust.position.set(engX, engY - 0.95, engZ);
  add(exhaust);
});

const MAST_BASE_Z = FZ + 0.9;
const MAST_HEIGHT = 1.9;
const HUB_Z = MAST_BASE_Z + MAST_HEIGHT;
const ROTOR_Y = WING_LE_Y;

const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, MAST_HEIGHT, 16), mat(0x4a4842));
mast.rotation.x = Math.PI / 2;
mast.position.set(0, ROTOR_Y, MAST_BASE_Z + MAST_HEIGHT / 2);
add(mast, true);

const rotorAssembly = new THREE.Group();
rotorAssembly.position.set(0, ROTOR_Y, HUB_Z);
aircraft.add(rotorAssembly);

const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.5, 24), mat(COLOR_ROTOR_HUB, { roughness: 0.4, metalness: 0.3 }));
hub.rotation.x = Math.PI / 2;
hub.castShadow = true;
rotorAssembly.add(hub);

const BLADE_LEN = 5.2, BLADE_COUNT = 5;
const bladeMat = mat(COLOR_ROTOR_BLADE, { roughness: 0.35, metalness: 0.3 });
for (let i = 0; i < BLADE_COUNT; i++) {
  const blade = new THREE.Mesh(new THREE.BoxGeometry(BLADE_LEN, 0.42, 0.06), bladeMat);
  blade.position.x = 0.42 + BLADE_LEN / 2;
  blade.castShadow = true;
  const holder = new THREE.Group();
  holder.rotation.z = (i / BLADE_COUNT) * Math.PI * 2;
  holder.add(blade);
  rotorAssembly.add(holder);
}

function makeSymGeometry(halfSpan, rootChord, tipChord, sweep, thickness) {
  const rootLE = 0, rootTE = -rootChord, tipLE = -sweep, tipTE = -sweep - tipChord;
  const shape = new THREE.Shape();
  shape.moveTo(-halfSpan, tipLE);
  shape.lineTo(-halfSpan, tipTE);
  shape.lineTo(0, rootTE);
  shape.lineTo(halfSpan, tipTE);
  shape.lineTo(halfSpan, tipLE);
  shape.lineTo(0, rootLE);
  shape.lineTo(-halfSpan, tipLE);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false });
  geo.translate(0, 0, -thickness / 2);
  return geo;
}

const TAIL_Y = -3.0;
const FIN_ROOT_Z = FZ + 0.4;
const FIN_HEIGHT = 2.0, FIN_ROOT_CHORD = 1.2, FIN_TIP_CHORD = 0.65, FIN_SWEEP = 0.55, FIN_THICK = 0.16;

const finMat = mat(COLOR_TAIL, { side: THREE.DoubleSide, roughness: 0.45 });
const fin = new THREE.Mesh(makeWingGeometry(FIN_HEIGHT, FIN_ROOT_CHORD, FIN_TIP_CHORD, FIN_SWEEP, FIN_THICK, 1), finMat);
fin.rotation.y = -Math.PI / 2;
fin.position.set(0, TAIL_Y, FIN_ROOT_Z);
add(fin, true);

const rudder = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.32, FIN_HEIGHT * 0.65), mat(COLOR_TAIL_ACC));
rudder.position.set(0, TAIL_Y - FIN_ROOT_CHORD * 0.55, FIN_ROOT_Z + FIN_HEIGHT * 0.55);
add(rudder);

const STAB_Z = FIN_ROOT_Z + FIN_HEIGHT;
const STAB_HALF = 1.7, STAB_ROOT_CHORD = 0.85, STAB_TIP_CHORD = 0.5, STAB_SWEEP = 0.35, STAB_THICK = 0.14;
const stabMat = mat(COLOR_TAIL, { side: THREE.DoubleSide, roughness: 0.45 });
const stab = new THREE.Mesh(makeSymGeometry(STAB_HALF, STAB_ROOT_CHORD, STAB_TIP_CHORD, STAB_SWEEP, STAB_THICK), stabMat);
stab.position.set(0, TAIL_Y - 0.15, STAB_Z);
add(stab, true);

const elevator = new THREE.Mesh(new THREE.BoxGeometry(STAB_HALF * 1.7, 0.32, 0.07), mat(COLOR_TAIL_ACC));
elevator.position.set(0, TAIL_Y - 0.15 - STAB_ROOT_CHORD * 0.55, STAB_Z);
add(elevator);

const GEAR_LEN = 0.7;
function landingGear(x, y) {
  const strut = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, GEAR_LEN), mat(COLOR_GEAR));
  strut.position.set(x, y, GEAR_LEN / 2);
  add(strut, true);
  const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.18, 18), mat(0x1f1e1c, { roughness: 0.8 }));
  wheel.rotation.z = Math.PI / 2;
  wheel.position.set(x, y, 0.26);
  add(wheel, true);
}
landingGear(0, 3.0);
landingGear(1.0, 0.6);
landingGear(-1.0, 0.6);

let spinning = true;
let spinSpeed = 0.55;

function animate() {
  requestAnimationFrame(animate);
  if (spinning) rotorAssembly.rotation.z += spinSpeed;
  controls.update();
  renderer.render(scene, camera);
}
animate();

document.getElementById('btn-iso').addEventListener('click', () => setView([11, -13, 9], [0, -0.3, 1.6]));
document.getElementById('btn-front').addEventListener('click', () => setView([0, 17, 2.2], [0, 0, 1.6]));
document.getElementById('btn-side').addEventListener('click', () => setView([16, 0.5, 2.0], [0, 0.5, 1.6]));
document.getElementById('btn-top').addEventListener('click', () => setView([0.01, -0.4, 19], [0, -0.4, 0]));

document.getElementById('btn-wire').addEventListener('click', (e) => {
  aircraft.traverse((obj) => {
    if (obj.isMesh) obj.material.wireframe = !obj.material.wireframe;
  });
});

document.getElementById('btn-spin').addEventListener('click', (e) => {
  spinning = !spinning;
  e.currentTarget.textContent = spinning ? 'Pause rotor' : 'Spin rotor';
});
</script>
